<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Roblox Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Calibri', sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }
        .hero {
            height: 100vh;
            background-image: url('https://media.discordapp.net/attachments/1226767602542579713/1274814748147454067/bept_1.6_banner.jpg?ex=66c39f40&is=66c24dc0&hm=408eac410d01d94f7181801b9f85502967136dd2232a27472cd24218289607eb&=&format=webp&width=719&height=287');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(to bottom, rgba(240,240,240,0), rgba(240,240,240,1));
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .content { margin-top: 40vh;
            margin-top: 50vh;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .cta-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #00a2ff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .cta-button:hover {
            background-color: #0081cc;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="container">
            <header>
                <div class="logo">Awesome Roblox Game</div>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="info.html">Info</a>
                    <a href="changelog.html">Changelog</a>
                    <a href="credits.html">Credits</a>
                </nav>
            </header>
            <div class="content">
                <h1>Welcome to Our Awesome Roblox Game!</h1>
                <a href="#" class="cta-button">Play Now!</a>
            </div>
        </div>
    </div>
</body>
</html>
