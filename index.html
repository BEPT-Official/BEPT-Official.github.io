<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Roblox Adventure</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px 0;
        }
        .logo {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: url('https://via.placeholder.com/200') no-repeat center;
            background-size: cover;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0));
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0));
        }
        nav {
            background-color: #2c2c2c;
            padding: 10px 0;
            margin-top: 20px;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav ul li a:hover {
            color: #ff4500;
        }
        .content {
            margin-top: 40px;
            text-align: center;
        }
        h1 {
            color: #ff4500;
            font-size: 2.5em;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            background-color: #ff4500;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .cta-button:hover {
            background-color: #ff6a33;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"></div>
        </header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="info.html">Info</a></li>
                <li><a href="changelog.html">Changelog</a></li>
                <li><a href="credits.html">Credits</a></li>
            </ul>
        </nav>
        <div class="content">
            <h1>Welcome to Awesome Roblox Adventure</h1>
            <p>Embark on an epic journey through stunning worlds, challenging obstacles, and thrilling adventures!</p>
            <a href="#" class="cta-button">Play Now!</a>
        </div>
    </div>
</body>
</html>
